name: nightly

on:
  push:
    branches: [main]

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install frontend deps
        run: npm ci --prefix ui
      - name: Package Linux amd64/arm64 nightly
        run: ./scripts/package-release.sh nightly release
      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boxd-nightly-linux
          path: |
            release/boxd_nightly_linux_amd64.tar.gz
            release/boxd_nightly_linux_amd64.tar.gz.sha256
            release/boxd_nightly_linux_arm64.tar.gz
            release/boxd_nightly_linux_arm64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
      - name: Update rolling nightly GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          notes="Rolling nightly build from \`main\`.

          - Commit: \`${{ github.sha }}\`
          - Built at: \`${{ github.event.head_commit.timestamp }}\`
          - Architectures: \`linux/amd64\`, \`linux/arm64\`

          This release always points at the latest successful \`main\` build.
          Asset names stay fixed as:
          - \`boxd_nightly_linux_amd64.tar.gz\`
          - \`boxd_nightly_linux_arm64.tar.gz\`"
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --title Nightly --prerelease --notes "$notes"
          else
            gh release create nightly \
              --title Nightly \
              --prerelease \
              --notes "$notes" \
              --target "${{ github.sha }}"
          fi
          gh release upload nightly \
            release/boxd_nightly_linux_amd64.tar.gz \
            release/boxd_nightly_linux_amd64.tar.gz.sha256 \
            release/boxd_nightly_linux_arm64.tar.gz \
            release/boxd_nightly_linux_arm64.tar.gz.sha256 \
            --clobber
          git tag -f nightly "${{ github.sha }}"
          git push -f origin refs/tags/nightly

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute image metadata
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${image}:nightly" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=nightly
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max
